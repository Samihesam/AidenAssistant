name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: دریافت کد از ریپازیتوری
        uses: actions/checkout@v4

      - name: نصب Java (نیاز Gradle)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: نصب Android SDK
        uses: android-actions/setup-android@v3

      - name: نصب Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.7

      - name: ساخت نسخه‌ی Debug APK
        run: gradle assembleDebug

      - name: آپلود APK به‌عنوان خروجی قابل‌دانلود
        uses: actions/upload-artifact@v4
        with:
          name: aiden-assistant-apk
          path: app/app/build/outputs/apk/debug/app-debug.apk
